<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Port Angeles Firewood</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background-color: #ffffff;
      color: #20366b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 340px;
      height: 340px;
      border-radius: 50%;
      margin: 0 auto 32px;
      display: block;
    }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
    }

    .tagline {
      font-size: 1.125rem;
      opacity: 0.85;
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: rgba(32,54,107,0.25);
      margin: 0 auto 40px;
    }

    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      text-align: left;
    }

    .icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      margin-top: 4px;
      color: #20366b;
      opacity: 0.7;
    }

    .contact-item .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.6;
      margin-bottom: 4px;
      font-family: Arial, sans-serif;
    }

    .contact-item .value {
      font-size: 1.05rem;
      line-height: 1.5;
    }

    a {
      color: #20366b;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    a:hover {
      opacity: 0.8;
    }

    .footer {
      margin-top: 48px;
      font-size: 0.8rem;
      opacity: 0.45;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="images/logo.jpeg" alt="Port Angeles Firewood" class="logo">

    <h1>New Website Coming Soon</h1>
    <p class="tagline">We're working on something new — but we're still delivering wood and taking orders in the meantime.</p>

    <div class="divider"></div>

    <div class="contact-block">
      <div class="contact-item">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.28h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <div>
          <div class="label">Call or Text</div>
          <div class="value"><a href="tel:+13605827910">(360) 582-7910</a></div>
        </div>
      </div>

      <div class="contact-item">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.971h-1.513c-1.491 0-1.956.931-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
        <div>
          <div class="label">Follow Us</div>
          <div class="value"><a href="https://facebook.com/portangelesfirewood" target="_blank" rel="noopener">facebook.com/portangelesfirewood</a></div>
        </div>
      </div>

      <div class="contact-item">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <div>
          <div class="label">Address</div>
          <div class="value">262 Deer Park Road<br>Port Angeles, WA 98362</div>
        </div>
      </div>
    </div>

    <p class="footer">© 2026 Port Angeles Firewood</p>
  </div>
</body>
</html>
